version: "3.8"

services:
  database:
    image: postgres:15
    container_name: postgres-db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: student_db
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password

    secrets:
      - db_password

    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d

    ports:
      - "5432:5432"

    networks:
      - backend-network

  backend:
    build: ./student-server
    container_name: backend
    restart: always

    depends_on:
      - database

    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: postgres
      DB_NAME: student_db
      DB_PASSWORD_FILE: /run/secrets/db_password

    secrets:
      - db_password

    ports:
      - "3005:3005"

    networks:
      - backend-network
      - frontend-network

  webapp:
    build: ./student-web
    container_name: react-app
    restart: always

    depends_on:
      - backend

    ports:
      - "5173:5173"

    networks:
      - frontend-network

volumes:
  db_data:

networks:
  backend-network:
  frontend-network:

secrets:
  db_password:
    file: ./db_password.txt